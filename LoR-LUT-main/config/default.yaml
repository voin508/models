
seed: 1337

data:
  root: ""         # 设置到 /dataset_root
  train_sub: "train"
  val_sub: "val"
  in_dir: "input"
  gt_dir: "gt"
  ext: [".jpg", ".jpeg", ".png", ".tif", ".tiff"]

model:
  G: 33
  K: 8
  R: 4

train:
  iters: 24000 #20000
  batch: 8
  patch: 512
  log_every: 100
  val_every: 2000
  amp: true

loss:
  l1: 1
  de2000: 0
  de2000_start_iter: 5000
  tv: 0.001
  mono: 5
  dl2: 0.001
  lpips: 0
  alpha_l2: 0.001

optim:
  lr: 0.0001 #0.0001
  weight_decay: 0.0001

sched:
  cosine: true
  min_lr: 0.00001
